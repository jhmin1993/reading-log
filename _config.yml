title: "Reading Log"
description: "하루 3~5장 독서 기록"
url: "https://jhmin1993.github.io"
baseurl: "/reading-log"
repository: "jhmin1993/reading-log"
author:
  name: "jhmin1993"
lang: ko

remote_theme: pages-themes/primer@v0.6.0

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  books:
    output: true
    permalink: /books/:path/
  logs:
    output: true
    permalink: /logs/:path/

defaults:
  - scope: { path: "index.md" }
    values: { layout: "default" }
  - scope: { type: "books" }
    values: { layout: "book" }
  - scope: { type: "logs" }
    values: { layout: "log" }

markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - CLAUDE.md
